services:
  postgres:
    image: postgres:16-alpine
    container_name: ovtl-postgres
    environment:
      POSTGRES_USER: ovtl
      POSTGRES_PASSWORD: ovtl
      POSTGRES_DB: ovtl
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ovtl -d ovtl"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
