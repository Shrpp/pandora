services:
  postgres:
    image: postgres:16-alpine
    container_name: ovlt-postgres
    environment:
      POSTGRES_USER: ovlt
      POSTGRES_PASSWORD: ovlt
      POSTGRES_DB: ovlt
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ovlt -d ovlt"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  ovlt-core:
    build: .
    image: ovlt
    container_name: ovlt-core
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://ovlt:ovlt@postgres:5432/ovlt"
      JWT_SECRET: "change-me-in-dev-min-32-chars-jwt-secret-here"
      MASTER_ENCRYPTION_KEY: "change-me-in-dev-min-32-chars-master-key-here"
      TENANT_WRAP_KEY: "change-me-in-dev-min-32-chars-wrap-key-here!!"
      ENVIRONMENT: development
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "3000"
      CORS_ALLOWED_ORIGINS: "*"
      OVLT_ISSUER: "http://localhost:3000"
      # Admin key — protege POST/GET /tenants y /clients
      OVLT_ADMIN_KEY: "dev-admin-key"
      # Bootstrap — crea el tenant master + admin al primer arranque si no existen tenants
      OVLT_BOOTSTRAP_TENANT_SLUG: "master"
      OVLT_BOOTSTRAP_ADMIN_EMAIL: "admin@example.com"
      OVLT_BOOTSTRAP_ADMIN_PASSWORD: "Admin1234!"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    command: ["./ovlt-core", "--migrate"]

volumes:
  postgres_data:
