name: Release CLI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: ovlt
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: ovlt
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: ovlt
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: ovlt
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: ovlt.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Install cross (ARM only)
        if: matrix.cross
        run: cargo install cross

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --bin ovlt --target ${{ matrix.target }}
          else
            cargo build --release --bin ovlt --target ${{ matrix.target }}
          fi

      - name: Package binary
        shell: bash
        run: |
          ext="${{ matrix.binary == 'ovlt.exe' && '.exe' || '' }}"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" \
             "ovlt-${{ matrix.target }}${ext}"

      - uses: actions/upload-artifact@v4
        with:
          name: ovlt-${{ matrix.target }}
          path: ovlt-${{ matrix.target }}*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
