name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  DATABASE_URL: postgresql://ovlt:ovlt@localhost:5432/ovlt
  JWT_SECRET: ci-jwt-secret-change-me-min-32-chars
  MASTER_ENCRYPTION_KEY: ci-master-enc-key-change-me-32chars
  TENANT_WRAP_KEY: ci-tenant-wrap-key-change-me-32ch!
  OVLT_ADMIN_KEY: ci-admin-key
  OVLT_ISSUER: http://localhost:3000

jobs:
  # ── Formatting ────────────────────────────────────────────────────────────────
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup component add rustfmt
      - run: cargo fmt --all -- --check

  # ── Lint ──────────────────────────────────────────────────────────────────────
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - run: rustup component add clippy
      - run: cargo clippy --workspace -- -D warnings

  # ── Tests ─────────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ovlt
          POSTGRES_PASSWORD: ovlt
          POSTGRES_DB: ovlt
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ovlt -d ovlt"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Run migrations
        run: cargo run --bin ovlt-core -- --migrate
      - name: Run all tests
        run: cargo test --workspace

  # ── Docker image ─────────────────────────────────────────────────────────────
  docker:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: [fmt, clippy, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/ovlt-core
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── CLI binaries ──────────────────────────────────────────────────────────────
  binaries:
    name: Build binary (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: [fmt, clippy, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: ovlt-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: ovlt-linux-aarch64
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: ovlt-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: ovlt-macos-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: ovlt-windows-x86_64.exe
    steps:
      - uses: actions/checkout@v4
      - run: rustup target add ${{ matrix.target }}
      - name: Install cross
        if: matrix.cross == true
        run: cargo install cross --locked
      - name: Build (cross)
        if: matrix.cross == true
        run: cross build --release --bin ovlt --target ${{ matrix.target }}
      - name: Build (native)
        if: matrix.cross != true
        run: cargo build --release --bin ovlt --target ${{ matrix.target }}
      - name: Rename binary (unix)
        if: matrix.os != 'windows-latest'
        run: cp target/${{ matrix.target }}/release/ovlt ${{ matrix.artifact }} && chmod +x ${{ matrix.artifact }}
      - name: Rename binary (windows)
        if: matrix.os == 'windows-latest'
        run: copy target\${{ matrix.target }}\release\ovlt.exe ${{ matrix.artifact }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 7

  # ── Security scan ────────────────────────────────────────────────────────────
  security:
    name: SBOM + Grype scan
    runs-on: ubuntu-latest
    needs: [fmt, clippy, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      packages: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image locally for scanning
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ovlt-core:scan
          cache-from: type=gha
      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          image: ovlt-core:scan
          artifact-name: ovlt-core-sbom.spdx.json
          format: spdx-json
          output-file: ovlt-core-sbom.spdx.json
      - name: Scan for vulnerabilities (Grype)
        uses: anchore/scan-action@v3
        with:
          image: ovlt-core:scan
          fail-build: true
          severity-cutoff: critical
          output-format: sarif
          output-file: grype-results.sarif
      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: grype-results.sarif
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: ovlt-core-sbom.spdx.json
          path: ovlt-core-sbom.spdx.json
          retention-days: 7

  # ── GitHub Release ────────────────────────────────────────────────────────────
  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: [docker, binaries, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true
          pattern: "ovlt-*"
      - name: Create or update rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-main
          name: "Latest (main)"
          prerelease: true
          body: |
            Automated build from `main` — ${{ github.sha }}

            **Install:**
            ```bash
            # macOS ARM (M1/M2/M3)
            curl -Lo ovlt https://github.com/${{ github.repository }}/releases/download/latest-main/ovlt-macos-aarch64
            chmod +x ovlt && sudo mv ovlt /usr/local/bin/

            # macOS Intel
            curl -Lo ovlt https://github.com/${{ github.repository }}/releases/download/latest-main/ovlt-macos-x86_64
            chmod +x ovlt && sudo mv ovlt /usr/local/bin/

            # Linux x86_64
            curl -Lo ovlt https://github.com/${{ github.repository }}/releases/download/latest-main/ovlt-linux-x86_64
            chmod +x ovlt && sudo mv ovlt /usr/local/bin/
            ```

            **Docker:**
            ```bash
            docker run -p 3000:3000 ghcr.io/${{ github.repository_owner }}/ovlt-core:latest
            ```
          files: artifacts/*
